services:
  - type: web
    name: vnh-business-plan-tool
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vnh-business-plan-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_NAME
        value: VNH Business Plan Tool
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@vnh.local
      - key: DEFAULT_ADMIN_NAME
        value: Business Plan Admin
      - key: NODE_ENV
        value: production

databases:
  - name: vnh-business-plan-db
    plan: starter
